services:
  mercury:
    build:
      context: .
      args:
        MERCURY_CLIS: ${MERCURY_CLIS:-jira,bitbucket}
    env_file:
      - path: .env
        required: false
    volumes:
      - wiki-vault:/app/wiki-vault
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

# D-17: the mercury container's network should be limited to $OLLAMA_HOST +
# Jira API + Google Chat API + GitHub API. Not expressible with Docker/Compose:
# requires firewall/egress policy at the host level or a reverse proxy in the
# real deployment (office private cloud) — known gap, not implemented here.

volumes:
  wiki-vault:
  qdrant-data:
