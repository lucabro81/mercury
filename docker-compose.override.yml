# Applied automatically by `docker compose up` on top of docker-compose.yml,
# no flag required. Local development only — the base file stays faithful
# to the real deployment (immutable image, no bind mount).
services:
  mercury:
    volumes:
      - ./src:/app/src
      # ad-hoc: reuse the host's existing CLI auth instead of provisioning
      # separate container credentials. Not :ro — jira-cli writes back to
      # credentials.json when it refreshes an expired token.
      - ~/.config/jira-cli:/home/mercury/.config/jira-cli
      - ~/.config/google-chat-cli:/home/mercury/.config/google-chat-cli
    command: ["bun", "run", "--watch", "src/index.ts"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
